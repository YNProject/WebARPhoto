<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>位置固定ARフォト - 巨大デバッグ版</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="debug-panel">
        GPS情報: 取得中...<br>
        表示中: <span id="photo-count">0</span>枚
    </div>

    <div id="start-screen">
        <h1>位置固定ARフォト</h1>
        <p>タップしてスタート</p>
        <small>※屋外の広い場所で使ってください</small>
    </div>

    <div class="ui-container" id="main-ui">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <label for="fileInput" id="fileLabel">① 写真を選ぶ</label>
        <button id="clearBtn" type="button" class="btn-danger">全消去</button>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
    >
      <a-camera id="myCamera" gps-camera="minDistance: 0;" rotation-reader> </a-camera>
    </a-scene>

    <script src="js/photoar.js"></script>
</body>
</html>
